name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Update GitOps repository
  shell: bash
  env:
    GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
  run: |
    set -e

    # Install yq (lightweight, safe YAML editor)
    YQ_VERSION=v4.44.1
    wget -q https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64 -O yq
    chmod +x yq
    sudo mv yq /usr/local/bin/

    # Configure git
    git config --global user.name "GitHub Actions"
    git config --global user.email "actions@github.com"

    # Clean workspace
    rm -rf gitops

    # Clone repo
    git clone https://${GIT_TOKEN}@github.com/danzees/grade-api-gitops.git gitops
    cd gitops

    echo "Before change:"
    cat deployment.yaml

    # Update image safely (assumes standard k8s structure)
    yq -i '
      .spec.template.spec.containers[0].image = "ghcr.io/'"${{ github.repository }}"':'"${{ github.sha }}"'"
    ' deployment.yaml

    echo "After change:"
    cat deployment.yaml

    # Stage changes
    git add deployment.yaml

    # Only commit if something changed
    if git diff --cached --quiet; then
      echo "No changes to commit"
    else
      git commit -m "Update image to ${{ github.sha }}"
      git push origin main
    fi
